schema {
  query: Query
  mutation: Mutation
}

directive @cacheControl(maxAge: Int, scope: CacheControlScope) on FIELD_DEFINITION | INTERFACE | OBJECT

enum CacheControlScope {
  PRIVATE
  PUBLIC
}

"""
A date string, such as 2007-12-03, compliant with the `full-date` format outlined in section 5.6 of the RFC 3339 profile of the ISO 8601 standard for representation of dates and times using the Gregorian calendar.
"""
scalar Date

"""
A date-time string at UTC, such as 2007-12-03T10:15:30Z, compliant with the `date-time` format outlined in section 5.6 of the RFC 3339 profile of the ISO 8601 standard for representation of dates and times using the Gregorian calendar.
"""
scalar DateTime

type ForgotPassword {
  ok: Boolean
}

input InputID {
  id: ID!
}

"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf).
"""
scalar JSON

"""The `Long` scalar type represents 52-bit integers"""
scalar Long

union Morph = ForgotPassword | UploadFile | UsersPermissionsLoginPayload | UsersPermissionsMe | UsersPermissionsMeRole | UsersPermissionsPermission | UsersPermissionsRole | UsersPermissionsUser | createUserPayload | updateUserPayload

type Mutation {
  changePassword(code: String!, password: String!, passwordConfirmation: String!): UsersPermissionsLoginPayload
  emailConfirmation(confirmation: String!): UsersPermissionsLoginPayload
  forgotPassword(email: String!): ForgotPassword
  login(input: UsersPermissionsLoginInput!): UsersPermissionsLoginPayload!
  multipleUpload(field: String, files: [Upload]!, ref: String, refId: ID, source: String): [UploadFile]!
  register(input: UserInput!): UsersPermissionsLoginPayload!
  """Update an existing user"""
  updateUser(input: updateUserInput): updateUserPayload
  upload(field: String, file: Upload!, ref: String, refId: ID, source: String): UploadFile!
}

type Query {
  me: UsersPermissionsMe
  user(id: ID!): UsersPermissionsUser
}

input RoleInput {
  description: String
  name: String!
  permissions: [ID]
  type: String
  users: [ID]
}

"""A time string with format: HH:mm:ss.SSS"""
scalar Time

"""The `Upload` scalar type represents a file upload."""
scalar Upload

type UploadFile {
  alternativeText: String
  caption: String
  created_at: DateTime!
  ext: String
  formats: JSON
  hash: String!
  height: Int
  id: ID!
  mime: String!
  name: String!
  previewUrl: String
  provider: String!
  provider_metadata: JSON
  related(limit: Int, sort: String, start: Int, where: JSON): [Morph]
  size: Float!
  updated_at: DateTime!
  url: String!
  width: Int
}

input UserInput {
  blocked: Boolean
  confirmed: Boolean
  email: String!
  firstName: String
  lastName: String
  password: String
  provider: String
  resetPasswordToken: String
  role: ID
  username: String!
}

input UsersPermissionsLoginInput {
  identifier: String!
  password: String!
  provider: String = "local"
}

type UsersPermissionsLoginPayload {
  jwt: String!
  user: UsersPermissionsMe!
}

type UsersPermissionsMe {
  blocked: Boolean
  confirmed: Boolean
  email: String!
  id: ID!
  role: UsersPermissionsMeRole
  username: String!
}

type UsersPermissionsMeRole {
  description: String
  id: ID!
  name: String!
  type: String
}

type UsersPermissionsPermission {
  action: String!
  controller: String!
  enabled: Boolean!
  id: ID!
  policy: String
  role: UsersPermissionsRole
  type: String!
}

type UsersPermissionsRole {
  description: String
  id: ID!
  name: String!
  permissions(limit: Int, sort: String, start: Int, where: JSON): [UsersPermissionsPermission]
  type: String
  users(limit: Int, sort: String, start: Int, where: JSON): [UsersPermissionsUser]
}

type UsersPermissionsUser {
  blocked: Boolean
  confirmed: Boolean
  created_at: DateTime!
  email: String!
  firstName: String
  id: ID!
  lastName: String
  provider: String
  role: UsersPermissionsRole
  updated_at: DateTime!
  username: String!
}

input createUserInput {
  data: UserInput
}

type createUserPayload {
  user: UsersPermissionsUser
}

input editRoleInput {
  description: String
  name: String
  permissions: [ID]
  type: String
  users: [ID]
}

input editUserInput {
  blocked: Boolean
  confirmed: Boolean
  email: String
  firstName: String
  lastName: String
  password: String
  provider: String
  resetPasswordToken: String
  role: ID
  username: String
}

input updateUserInput {
  data: editUserInput
  where: InputID
}

type updateUserPayload {
  user: UsersPermissionsUser
}